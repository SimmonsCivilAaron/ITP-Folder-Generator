<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ITP Package Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<style>
  #wip-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.65);
  z-index: 99999;
  display: flex;
  align-items: center;
  justify-content: center;
}

.wip-box {
  background: #d60000;
  color: white;
  border: 6px solid white;
  border-radius: 12px;
  padding: 40px 60px;
  text-align: center;
  box-shadow: 0 10px 40px rgba(0,0,0,0.4);
}

.wip-box h1 {
  font-size: 42px;
  font-weight: 800;
  margin-bottom: 10px;
  letter-spacing: 2px;
}

.wip-box p {
  font-size: 20px;
  margin: 0;
}
  
  :root {
    --navy: #2D3691;
    --sky: #29ACE4;
    --light-blue: #D6EEF9;
    --white: #ffffff;
    --text: #1a1a2e;
    --muted: #5a5a7a;
    --border: #d0d4e8;
    --surface: #f5f7ff;
    --success: #1D9E75;
    --radius: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--surface);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }
  .header {
    background: var(--navy);
    color: white;
    padding: 20px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    border-bottom: 4px solid var(--sky);
  }
  .header-logo {
    width: 44px; height: 44px;
    background: var(--sky);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 700; color: white; letter-spacing: -1px;
  }
  .header h1 { font-size: 18px; font-weight: 600; letter-spacing: 0.3px; }
  .header p { font-size: 12px; opacity: 0.7; margin-top: 2px; }
  .main { max-width: 820px; margin: 0 auto; padding: 32px 24px; }
  .card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 20px;
  }
  .card-title {
    font-size: 13px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.8px; color: var(--navy); margin-bottom: 20px;
    padding-bottom: 12px; border-bottom: 2px solid var(--light-blue);
    display: flex; align-items: center; gap: 8px;
  }
  .card-title::before {
    content: ''; width: 4px; height: 16px;
    background: var(--sky); border-radius: 2px; display: inline-block;
  }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .field input, .field select, .field textarea {
    border: 1px solid var(--border); border-radius: 6px;
    padding: 9px 12px; font-size: 14px; color: var(--text);
    background: white; transition: border-color 0.15s;
    font-family: inherit;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    outline: none; border-color: var(--sky);
    box-shadow: 0 0 0 3px rgba(41,172,228,0.12);
  }
  .field textarea { resize: vertical; min-height: 80px; }
  .type-row { display: flex; gap: 10px; }
  .type-btn {
    flex: 1; padding: 10px; border: 2px solid var(--border);
    border-radius: 6px; background: white; cursor: pointer;
    font-size: 13px; font-weight: 600; color: var(--muted);
    transition: all 0.15s; text-align: center;
  }
  .type-btn.active-hp { border-color: var(--navy); background: var(--navy); color: white; }
  .type-btn.active-wp { border-color: var(--sky); background: var(--sky); color: white; }
  .info-box {
    background: var(--light-blue); border-left: 4px solid var(--sky);
    border-radius: 4px; padding: 14px 16px; margin-top: 16px;
    font-size: 13px; line-height: 1.6; display: none;
  }
  .info-box.visible { display: block; }
  .info-label { font-weight: 700; font-size: 11px; text-transform: uppercase;
    letter-spacing: 0.6px; color: var(--navy); margin-bottom: 4px; }
  .info-value { color: var(--text); margin-bottom: 10px; }
  .info-value:last-child { margin-bottom: 0; }
  .checkboxes { display: flex; flex-direction: column; gap: 10px; }
  .checkbox-item { display: flex; align-items: center; gap: 10px; }
  .checkbox-item input[type=checkbox] {
    width: 16px; height: 16px; cursor: pointer; accent-color: var(--navy);
  }
  .checkbox-item label { font-size: 14px; cursor: pointer; }
  .add-doc-row { display: flex; gap: 8px; margin-top: 14px; }
  .add-doc-row input { flex: 1; }
  .btn-add {
    padding: 9px 16px; background: var(--light-blue); color: var(--navy);
    border: 1px solid var(--sky); border-radius: 6px; font-size: 13px;
    font-weight: 600; cursor: pointer; white-space: nowrap;
    transition: background 0.15s;
  }
  .btn-add:hover { background: var(--sky); color: white; }
  .btn-remove {
    background: none; border: none; color: #cc4444; cursor: pointer;
    font-size: 18px; line-height: 1; padding: 0 4px; opacity: 0.7;
  }
  .btn-remove:hover { opacity: 1; }
  .filename-preview {
    background: #f0f4ff; border: 1px dashed var(--navy);
    border-radius: 6px; padding: 12px 16px; font-size: 13px;
    color: var(--navy); font-family: 'Consolas', monospace;
    word-break: break-all; margin-top: 8px;
  }
  .generate-btn {
    width: 100%; padding: 14px; background: var(--navy); color: white;
    border: none; border-radius: 8px; font-size: 15px; font-weight: 700;
    cursor: pointer; letter-spacing: 0.3px; transition: background 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .generate-btn:hover { background: #1e2470; }
  .generate-btn:active { transform: scale(0.99); }
  .generate-btn svg { width: 18px; height: 18px; }
  .optional-tag {
    font-size: 10px; background: #eee; color: #888;
    padding: 1px 5px; border-radius: 3px; font-weight: 400;
    text-transform: none; letter-spacing: 0; margin-left: 4px;
  }
</style>
</head>
<body>

<div id="wip-overlay">
  <div class="wip-box">
    <h1>WORK IN PROGRESS</h1>
    <p>Please come back later.</p>
  </div>
</div>

<div class="header">
  <div class="header-logo">SCC</div>
  <div>
    <h1>ITP Package Generator</h1>
    <p>Simmons Civil Contracting — Hold Point &amp; Witness Point Submissions</p>
  </div>
</div>

<div class="main">

  <div class="card">
    <div class="card-title">Point Type &amp; Reference</div>
    <div class="row">
      <div class="field">
        <label>Specification</label>
        <select id="spec-select" onchange="updateClauses()">
          <option value="R11">R11 — Stormwater Drainage</option>
          <option value="R15">R15 — Kerb &amp; Gutter</option>
          <option value="R16">R16 — Precast Box Culverts</option>
          <option value="R23">R23 — Plastic Flexible Pipes</option>
          <option value="R33">R33 — Subsoil &amp; Trench Drains</option>
          <option value="R44">R44 — Earthworks</option>
          <option value="R50">R50 — Stabilisation</option>
          <option value="R53">R53 — Concrete Works</option>
          <option value="R54">R54 — General Concrete Paving</option>
          <option value="R55">R55 — Gabions &amp; Mattresses</option>
          <option value="R63">R63 — Geotextiles</option>
          <option value="R71">R71 — Unbound Pavement</option>
          <option value="R73">R73 — Plant Mixed HBP</option>
          <option value="R82">R82 — Lean-mix Subbase</option>
          <option value="R101">R101 — Cold Milling</option>
          <option value="R106">R106 — Sprayed Bituminous Surfacing</option>
          <option value="R116">R116 — Dense Graded Asphalt</option>
          <option value="R142">R142 — Retroreflective RPMs</option>
          <option value="R143">R143 — Signposting</option>
          <option value="R145">R145 — Pavement Marking</option>
          <option value="R178">R178 — Vegetation</option>
          <option value="B80">B80 — Stormwater Structure Concrete</option>
          <option value="R201">R201 — Fencing</option>
        </select>
      </div>
      <div class="field">
        <label id="point-num-label">Point Number</label>
        <input type="text" id="point-number" placeholder="e.g. 3" oninput="updatePreview()">
      </div>
    </div>

    <div style="margin-top:16px;" class="row" style="grid-template-columns: 1fr;">
      <div class="field" style="grid-column: span 2;">
        <label>Clause &amp; Type</label>
        <select id="clause-select" onchange="onClauseSelect()">
          <option value="">Select clause...</option>
        </select>
      </div>
    </div>

    <div id="type-badge" style="display:none; margin-top:10px;">
      <span id="type-badge-inner" style="display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:700; padding:4px 10px; border-radius:4px; text-transform:uppercase; letter-spacing:0.5px;"></span>
    </div>

    <div class="info-box" id="clause-info"></div>
  </div>

  <div class="card">
    <div class="card-title">Lot &amp; Location <span class="optional-tag">optional fields</span></div>
    <div class="row-3">
      <div class="field" style="grid-column: span 1;">
        <label>Lot Number / Details</label>
        <input type="text" id="lot-number" placeholder="e.g. Lot 12A" oninput="updatePreview()">
      </div>
      <div class="field">
        <label>Chainage From</label>
        <input type="text" id="ch-from" placeholder="e.g. 0+000">
      </div>
      <div class="field">
        <label>Chainage To</label>
        <input type="text" id="ch-to" placeholder="e.g. 0+250">
      </div>
    </div>
    <div class="field" style="margin-top:16px;">
      <label>Notes</label>
      <textarea id="notes" placeholder="Additional notes or comments..."></textarea>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Associated Documents</div>
    <div class="checkboxes" id="doc-checkboxes">
      <div class="checkbox-item">
        <input type="checkbox" id="doc-0" checked>
        <label for="doc-0">PCC Stormwater Pipe Inspection Report</label>
      </div>
      <div class="checkbox-item">
        <input type="checkbox" id="doc-1" checked>
        <label for="doc-1">Lot Map</label>
      </div>
    </div>
    <div class="add-doc-row">
      <input type="text" id="new-doc-input" placeholder="Add associated document..." class="field">
      <button class="btn-add" onclick="addDocument()">Add</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Output Preview</div>
    <div style="font-size:12px; color:var(--muted); margin-bottom:4px;">Zip filename</div>
    <div class="filename-preview" id="zip-preview">—</div>
    <div style="font-size:12px; color:var(--muted); margin-top:12px; margin-bottom:4px;">Document filename (inside IN folder)</div>
    <div class="filename-preview" id="doc-preview">—</div>
  </div>

  <button class="generate-btn" onclick="generate()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
    </svg>
    Generate &amp; Download Zip
  </button>
</div>

<script>
const DATA = {

      { clause: "2.6", short: "Manufactured Product Incorporation", process: "Incorporation into the Works of any supplied manufactured drainage product.", submission: "Certificate of conformity confirming materials and finished product comply with the Specification — at least 7 days prior to incorporation.", release: "Principal may inspect Quality Records before releasing." },

      { clause: "4.2.1", short: "Open Drain Grade", process: "Construction of open drains with grade less than 0.5%.", submission: "Notification that 0.5% minimum grade cannot be achieved.", release: "Principal considers the matter and directs further action before releasing." },
      { clause: "4.3.3", short: "Inadequate Foundation Replacement", process: "Replacement or treatment of inadequate foundation material.", submission: "Notification that inadequate foundation material has been excavated to extent directed, plus details of tests, inspections, geotechnical engineer assessment and any proposed foundation treatment.", release: "Principal inspects excavation and may direct further excavation before releasing." },
      { clause: "4.10", short: "Heavy Plant Crossings", process: "Moving heavy construction plant or vehicles over pipe or box culvert structures.", submission: "Certificate and verification of protective measures designed per TfNSW G2-C2.", release: "Principal may examine submitted documents before releasing." },

    ],
    R33: [
      { clause: "3.5", short: "Pipe Backfilling", process: "Backfilling over the drainage pipe in the trench with filter material.", submission: "Verification that pipe laying, jointing and bedding are complete and conforming.", release: "Principal may inspect drainage pipe in the trench before releasing." }
    ],
    R44: [

      { clause: "2.6", short: "Unsuitable Material Replacement", process: "Replacement of each Lot of unsuitable material.", submission: "Notification that unsuitable material has been removed as directed.", release: "Principal inspects excavation and may direct removal of further material before releasing." },

    ],

let currentType = 'HP';
let customDocs = [];
let docCounter = 2;

function loadSavedDocs() {
  try {
    const saved = localStorage.getItem('itp_custom_docs');
    if (saved) {
      customDocs = JSON.parse(saved);
      customDocs.forEach(d => addDocRow(d.label, d.id));
    }
  } catch(e) {}
}

function saveCustomDocs() {
  try {
    localStorage.setItem('itp_custom_docs', JSON.stringify(customDocs));
  } catch(e) {}
}

function updateClauses() {
  const spec = document.getElementById('spec-select').value;
  const sel = document.getElementById('clause-select');
  sel.innerHTML = '<option value="">Select clause...</option>';

  const hpItems = DATA['HP'][spec] || [];
  if (hpItems.length) {
    const grp = document.createElement('optgroup');
    grp.label = 'Hold Points';
    hpItems.forEach((item, i) => {
      const opt = document.createElement('option');
      opt.value = 'HP:' + i;
      opt.textContent = `HP — Cl ${item.clause} — ${item.short}`;
      grp.appendChild(opt);
    });
    sel.appendChild(grp);
  }

  const wpItems = DATA['WP'][spec] || [];
  if (wpItems.length) {
    const grp = document.createElement('optgroup');
    grp.label = 'Witness Points';
    wpItems.forEach((item, i) => {
      const opt = document.createElement('option');
      opt.value = 'WP:' + i;
      opt.textContent = `WP — Cl ${item.clause} — ${item.short}`;
      grp.appendChild(opt);
    });
    sel.appendChild(grp);
  }

  document.getElementById('clause-info').classList.remove('visible');
  document.getElementById('clause-info').innerHTML = '';
  document.getElementById('type-badge').style.display = 'none';
  currentType = 'HP';
  updatePreview();
}

function onClauseSelect() {
  const spec = document.getElementById('spec-select').value;
  const val = document.getElementById('clause-select').value;
  const box = document.getElementById('clause-info');
  const badge = document.getElementById('type-badge');
  const badgeInner = document.getElementById('type-badge-inner');

  if (val === '') {
    box.classList.remove('visible');
    box.innerHTML = '';
    badge.style.display = 'none';
    currentType = 'HP';
    document.getElementById('point-num-label').textContent = 'Point Number';
    updatePreview();
    return;
  }

  const parts = val.split(':');
  currentType = parts[0];
  const idx = parseInt(parts[1]);
  const item = DATA[currentType][spec][idx];

  document.getElementById('point-num-label').textContent = currentType === 'HP' ? 'Hold Point Number' : 'Witness Point Number';

  badgeInner.textContent = currentType === 'HP' ? 'Hold Point' : 'Witness Point';
  badgeInner.style.background = currentType === 'HP' ? 'var(--navy)' : 'var(--sky)';
  badgeInner.style.color = 'white';
  badge.style.display = 'block';

  let html = '';
  html += `<div class="info-label">Clause</div><div class="info-value">${item.clause} — ${item.process}</div>`;
  if (currentType === 'HP') {
    html += `<div class="info-label">Submission Details</div><div class="info-value">${item.submission}</div>`;
    html += `<div class="info-label">Release of Hold Point</div><div class="info-value">${item.release}</div>`;
  } else {
    html += `<div class="info-label">Process to be Witnessed</div><div class="info-value">${item.process}</div>`;
    html += `<div class="info-label">Submission Details</div><div class="info-value">${item.submission}</div>`;
  }
  box.innerHTML = html;
  box.classList.add('visible');
  updatePreview();
}

function getSelected() {
  const spec = document.getElementById('spec-select').value;
  const val = document.getElementById('clause-select').value;
  if (val === '') return null;
  const parts = val.split(':');
  return DATA[parts[0]][spec][parseInt(parts[1])];
}

function sanitize(s) {
  return s.replace(/[<>:"/\\|?*]/g, '').replace(/\s+/g, ' ').trim();
}

function updatePreview() {
  const num = document.getElementById('point-number').value.trim();
  const item = getSelected();
  const spec = document.getElementById('spec-select').value;
  const lot = document.getElementById('lot-number').value.trim();
  const specEl = document.getElementById('spec-select');
  const specLabel = specEl.options[specEl.selectedIndex].text;

  if (!num || !item) {
    document.getElementById('zip-preview').textContent = '—';
    document.getElementById('doc-preview').textContent = '—';
    return;
  }

  const prefix = currentType === 'HP' ? 'HP' : 'WP';
  const lotSuffix = lot ? ` ${sanitize(lot)}` : '';
  const zipName = `${prefix}${sanitize(num)} - ${specLabel} - Cl${item.clause} - ${sanitize(item.short)}${lotSuffix}.zip`;
  const docName = `${prefix}${sanitize(num)} - ${specLabel} - Cl${item.clause}.docx`;
  document.getElementById('zip-preview').textContent = zipName;
  document.getElementById('doc-preview').textContent = docName;
}

function addDocRow(label, id) {
  const wrap = document.createElement('div');
  wrap.className = 'checkbox-item';
  wrap.id = 'doc-wrap-' + id;
  wrap.innerHTML = `<input type="checkbox" id="doc-${id}" checked>
    <label for="doc-${id}">${label}</label>
    <button class="btn-remove" onclick="removeDoc(${id})" title="Remove">&#215;</button>`;
  document.getElementById('doc-checkboxes').appendChild(wrap);
}

function addDocument() {
  const inp = document.getElementById('new-doc-input');
  const label = inp.value.trim();
  if (!label) return;
  const id = docCounter++;
  customDocs.push({ id, label });
  addDocRow(label, id);
  saveCustomDocs();
  inp.value = '';
}

function removeDoc(id) {
  document.getElementById('doc-wrap-' + id)?.remove();
  customDocs = customDocs.filter(d => d.id !== id);
  saveCustomDocs();
}

function getCheckedDocs() {
  const items = document.querySelectorAll('#doc-checkboxes .checkbox-item');
  const checked = [];
  items.forEach(item => {
    const cb = item.querySelector('input[type=checkbox]');
    const lbl = item.querySelector('label');
    if (cb && cb.checked && lbl) checked.push(lbl.textContent);
  });
  return checked;
}

function buildDocx(item, spec, num, lot, chFrom, chTo, notes, checkedDocs) {
  const prefix = currentType === 'HP' ? 'Hold Point' : 'Witness Point';

    <w:r><w:rPr><w:color w:val="${SUBTLE}"/><w:sz w:val="16"/><w:rFonts w:ascii="Arial" w:hAnsi="Arial"/></w:rPr>
      <w:t xml:space="preserve">&#9;</w:t>

      <w:t>CONFIDENTIAL</w:t>

</w:hdr>`;

  const footerXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<w:ftr xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"
  xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">
  <w:p>
    <w:pPr>
      <w:spacing w:before="60"/>
      <w:pBdr><w:top w:val="single" w:sz="6" w:space="1" w:color="${BORDER}"/></w:pBdr>
      <w:tabs><w:tab w:val="right" w:pos="${CONTENT_W}"/></w:tabs>
    </w:pPr>
    <w:r><w:rPr><w:color w:val="${SUBTLE}"/><w:sz w:val="16"/><w:rFonts w:ascii="Arial" w:hAnsi="Arial"/></w:rPr>
      <w:t xml:space="preserve">${escXml(prefixShort + num)} \u2014 ${escXml(prefix)} Notification</w:t>
    </w:r>
    <w:r><w:rPr><w:color w:val="${SUBTLE}"/><w:sz w:val="16"/><w:rFonts w:ascii="Arial" w:hAnsi="Arial"/></w:rPr>

    <w:fldChar w:fldCharType="begin"/>

  const numberingXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<w:numbering xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main">

    <w:lvl w:ilvl="0">
      <w:start w:val="1"/>

      <w:rPr><w:rFonts w:ascii="Symbol" w:hAnsi="Symbol" w:hint="default"/></w:rPr>
    </w:lvl>
  </w:abstractNum>
  <w:num w:numId="1">
    <w:abstractNumId w:val="1"/>

  const relsXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
  <Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/header" Target="header1.xml"/>
  <Relationship Id="rId2" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/footer" Target="footer1.xml"/>
  <Relationship Id="rId3" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/numbering" Target="numbering.xml"/>

  const settingsXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<w:settings xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main">
  <w:defaultTabStop w:val="709"/>
  <w:compat><w:compatSetting w:name="compatibilityMode" w:uri="http://schemas.microsoft.com/office/word" w:val="15"/></w:compat>

  const stylesXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<w:styles xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main">
  <w:docDefaults>
    <w:rPrDefault><w:rPr>

  <w:style w:type="paragraph" w:styleId="Normal">

  const contentTypesXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">
  <Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>

  <Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/>
  <Override PartName="/word/header1.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.header+xml"/>
  <Override PartName="/word/footer1.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.footer+xml"/>
  <Override PartName="/word/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.styles+xml"/>
  <Override PartName="/word/settings.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.settings+xml"/>
  <Override PartName="/word/numbering.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.numbering+xml"/>
</Types>`;

  const packageRelsXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
  <Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/>
</Relationships>`;

  const docxZip = new JSZip();
  docxZip.file('[Content_Types].xml', contentTypesXml);
  docxZip.file('_rels/.rels', packageRelsXml);
  docxZip.file('word/document.xml', documentXml);
  docxZip.file('word/header1.xml', headerXml);
  docxZip.file('word/footer1.xml', footerXml);
  docxZip.file('word/styles.xml', stylesXml);
  docxZip.file('word/settings.xml', settingsXml);
  docxZip.file('word/numbering.xml', numberingXml);
  docxZip.file('word/_rels/document.xml.rels', relsXml);

  return docxZip;
}

function escXml(s) {
  if (!s) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&apos;');
}

async function generate() {
  const num = document.getElementById('point-number').value.trim();
  const item = getSelected();
  if (!num) { alert('Please enter a point number.'); return; }
  if (!item) { alert('Please select a clause.'); return; }

  const spec = document.getElementById('spec-select').value;
  const specLabel = document.getElementById('spec-select').options[document.getElementById('spec-select').selectedIndex].text;
  const lot = document.getElementById('lot-number').value.trim();
  const chFrom = document.getElementById('ch-from').value.trim();
  const chTo = document.getElementById('ch-to').value.trim();
  const notes = document.getElementById('notes').value.trim();
  const checkedDocs = getCheckedDocs();

  const prefix = currentType === 'HP' ? 'HP' : 'WP';
  const lotSuffix = lot ? ` ${sanitize(lot)}` : '';
  const zipName = `${prefix}${sanitize(num)} - ${specLabel} - Cl${item.clause} - ${sanitize(item.short)}${lotSuffix}.zip`;
  const docName = `${prefix}${sanitize(num)} - ${specLabel} - Cl${item.clause}.docx`;

  const outerZip = new JSZip();
  outerZip.folder('IN');
  outerZip.folder('OUT');

  const docxZip = buildDocx(item, spec, num, lot, chFrom, chTo, notes, checkedDocs);
  const docxBlob = await docxZip.generateAsync({ type: 'blob', compression: 'DEFLATE' });
  const docxBuffer = await docxBlob.arrayBuffer();

  outerZip.file('IN/' + docName, docxBuffer);

  const blob = await outerZip.generateAsync({ type: 'blob', compression: 'DEFLATE' });
  saveAs(blob, zipName);
}

updateClauses();
loadSavedDocs();
</script>
